<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>社員用</title>

<style>
body {
  margin: 0;
  display: flex;
  justify-content: center;
  font-family: sans-serif;
  background: #fff;
}

.screen {
  width: 360px;
}

.header {
  position: relative;
  padding: 20px 10px;
  text-align: center;
}

.gear {
  position: absolute;
  top: 15px;
  right: 15px;
  font-size: 22px;
  cursor: pointer;
}

.menu {
  padding: 20px 40px;
  text-align: center;
}

button {
  width: 100%;
  padding: 15px;
  margin: 12px 0;
  font-size: 16px;
}

.parttime {
  background: #666;
  color: #fff;
}

/* ログアウト共通 */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  display: none;
  justify-content: center;
  align-items: center;
}

.dialog {
  background: #e4e9ee;
  padding: 20px;
  width: 260px;
  text-align: center;
  border: 1px solid #333;
}

</style>
</head>

<body>

<div class="screen">
  <div class="header">
    <div class="gear" onclick="openLogout()">⚙</div>
    みどり亭　メニュー管理システム<br>
    社員用
  </div>

  <div class="menu">
    <button onclick="goAdd()">商品追加</button>
    <button onclick="goDelete()">商品削除</button>
    <button onclick="goChange()">商品変更</button>
    <button class="parttime" onclick="goPartTime()">アルバイト用</button>
  </div>
</div>

<div class="overlay" id="logout">
  <div class="dialog">
    ログアウトしますか？
    <div class="dialog-buttons">
      <button onclick="closeLogout()">いいえ</button>
      <button onclick="logout()">はい</button>
    </div>
  </div>
</div>

<script>
function goAdd() {
  location.href = "product_add.html";
}

function goDelete() {
  location.href = "product_delete.html";
}

function goChange() {
  location.href = "product_change_search.html";
}

function goPartTime() {
  location.href = "../parttime/menu.html";
}

function goDelete() {
  location.href = "product_delete.html";
}

function openLogout() {
  document.getElementById("logout").style.display = "flex";
}
function closeLogout() {
  document.getElementById("logout").style.display = "none";
}
function logout() {
  location.href = "../login.html";
}

function openLogout() {
  document.getElementById("logout").style.display = "flex";
}
function closeLogout() {
  document.getElementById("logout").style.display = "none";
}
function logout() {
  location.href = "../login.html";
}
</script>

</body>
</html>
