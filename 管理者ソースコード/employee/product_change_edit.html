<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商品変更</title>

<style>
body{
  margin:0;
  display:flex;
  justify-content:center;
  font-family:sans-serif;
  background:#fff;
}
.screen{
  width:360px;
  min-height:100vh;
  position:relative;
  padding-bottom:40px;
}

/* 上部 */
.top{
  position:relative;
  padding:14px 14px 6px;
}
.title{
  color:#2460c0;
  font-size:16px;
  font-weight:600;
}
.gear{
  position:absolute;
  top:12px;
  right:12px;
  font-size:22px;
  cursor:pointer;
}

/* 中身 */
.content{ padding:10px 22px 0; }

.label{
  font-size:14px;
  margin:12px 0 6px;
}

/* 枠 */
.box{
  border:1px solid #999;
  padding:10px;
  box-sizing:border-box;
}
.box-fixed{
  height:150px;
  position:relative;
}
.box-auto{
  height:auto;
}

/* 変更前表示 */
.selected-pill{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  background:#264fb8;
  color:#fff;
  border-radius:6px;
  padding:6px 12px;
  font-size:12px;
}

/* 入力 */
.edit-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:6px;
}
.edit-grid input,
.edit-grid select{
  height:34px;
  padding:0 10px;
  border:1px solid #999;
  border-radius:6px;
  font-size:14px;
  box-sizing:border-box;
}

/* エラー */
.error{
  color:red;
  font-size:12px;
  display:none;
  margin-bottom:4px;
}

/* 下ボタン */
.bottom{
  display:flex;
  justify-content:space-between;
  padding:18px 22px 0;
}
.bottom button{
  width:120px;
  height:42px;
  font-size:16px;
  border:1px solid #999;
  background:#eee;
  cursor:pointer;
}

/* ログアウト */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.3);
  display:none;
  justify-content:center;
  align-items:center;
}
.dialog{
  width:300px;
  background:#dfe5ea;
  border:1px solid #333;
  padding:18px;
}
.dialog-buttons{
  display:flex;
  justify-content:space-around;
}
.dialog button{
  width:80px;
  height:36px;
}
</style>
</head>

<body>

<div class="screen">

  <div class="top">
    <div class="title">商品変更</div>
  </div>

  <div class="content">

    <!-- 変更前 -->
    <div class="label">変更前</div>
    <div class="box box-fixed">
      <div class="selected-pill" id="selectedName">（未選択）</div>
    </div>

    <!-- 変更後 -->
    <div class="label" style="margin-top:14px;">変更後</div>
    <div class="box box-auto">
      <div class="edit-grid">

        <!-- 商品名 -->
        <input id="newName" placeholder="商品名（変更後）">
        <div class="error" id="errName">商品名を入力してください</div>

        <!-- カテゴリー（プルダウン） -->
        <select id="categorySelect" onchange="toggleOther()">
          <option value="">選択してください</option>
          <option>おすすめ</option>
          <option>飲み放題</option>
          <option>スピードメニュー</option>
          <option>焼鳥（たれ）</option>
          <option>焼鳥（塩）</option>
          <option>一品</option>
          <option>デザート</option>
          <option>シメ</option>
          <option>ソフトドリンク</option>
          <option>アルコール</option>
          <option value="other">その他（サービス品）</option>
        </select>

        <!-- その他入力 -->
        <input id="categoryOther"
               placeholder="カテゴリーを入力"
               disabled>
        <div class="error" id="errCategory">カテゴリーを選択してください</div>

        <!-- 値段 -->
        <input id="newPrice" placeholder="値段（変更後）">
        <div class="error" id="errPrice">値段を入力してください</div>

      </div>
    </div>
  </div>

  <div class="bottom">
    <button onclick="goBack()">戻る</button>
    <button onclick="openChangeConfirm()">変更</button>
  </div>
</div>


<script>
// 選択商品表示
const params = new URLSearchParams(location.search);
const item = params.get("item") || "（未選択）";
document.getElementById("selectedName").textContent = item;

function goBack(){
  location.href = "product_change_search.html";
}

/* その他選択制御 */
function toggleOther(){
  const select = document.getElementById("categorySelect");
  const other = document.getElementById("categoryOther");

  if(select.value === "other"){
    other.disabled = false;
  } else {
    other.disabled = true;
    other.value = "";
  }
}

/* ✅ 必須チェック＋確認画面へ */
function openChangeConfirm(){
  const name = document.getElementById("newName").value.trim();
  const price = document.getElementById("newPrice").value.trim();
  const select = document.getElementById("categorySelect").value;
  const other = document.getElementById("categoryOther").value.trim();

  document.getElementById("errName").style.display = "none";
  document.getElementById("errCategory").style.display = "none";
  document.getElementById("errPrice").style.display = "none";

  let hasError = false;

  if(name === ""){
    document.getElementById("errName").style.display = "block";
    hasError = true;
  }

  if(select === "" || (select === "other" && other === "")){
    document.getElementById("errCategory").style.display = "block";
    hasError = true;
  }

  if(price === ""){
    document.getElementById("errPrice").style.display = "block";
    hasError = true;
  }

  if(hasError) return;

  // ✅ 確認画面へ（URLで渡す）
  location.href =
    "product_change_confirm.html"
    + "?old=" + encodeURIComponent(item)
    + "&name=" + encodeURIComponent(name)
    + "&category=" + encodeURIComponent(select === "other" ? other : select)
    + "&price=" + encodeURIComponent(price);
}

</script>

</body>
</html>
