<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商品変更 確認</title>

<style>
body{
  margin:0;
  display:flex;
  justify-content:center;
  font-family:sans-serif;
  background:#fff;
}
.screen{
  width:360px;
  min-height:100vh;
}

.top{
  padding:14px;
  font-size:16px;
  font-weight:600;
  color:#2460c0;
}

.box{
  border:1px solid #999;
  padding:12px;
  margin:10px 22px;
}

.row{
  margin:6px 0;
  font-size:14px;
}

.bottom{
  display:flex;
  justify-content:space-between;
  padding:18px 22px;
}
.bottom button{
  width:120px;
  height:42px;
  font-size:16px;
}
</style>
</head>

<body>

<div class="screen">

  <div class="top">商品変更（確認）</div>

  <div class="box">
    <div class="row">変更前：<b id="old"></b></div>
    <div class="row">商品名：<span id="name"></span></div>
    <div class="row">カテゴリー：<span id="category"></span></div>
    <div class="row">値段：<span id="price"></span></div>
  </div>

  <div class="bottom">
    <button onclick="history.back()">いいえ</button>
    <button onclick="applyChange()">はい</button>
  </div>

</div>

<script>
// ✅ 最小限JS：URLから読むだけ
const params = new URLSearchParams(location.search);

document.getElementById("old").textContent = params.get("old");
document.getElementById("name").textContent = params.get("name");
document.getElementById("category").textContent = params.get("category");
document.getElementById("price").textContent = params.get("price");

function applyChange(){
  alert("変更しました（仮）");
  location.href = "menu.html";
}
</script>

</body>
</html>
