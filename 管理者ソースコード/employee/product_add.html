<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商品追加</title>

<style>
body {
  margin: 0;
  display: flex;
  justify-content: center;
  font-family: sans-serif;
}

.screen {
  width: 360px;
}

.header {
  position: relative;
  padding: 20px 10px;
  text-align: center;
}

.gear {
  position: absolute;
  top: 15px;
  right: 15px;
  font-size: 22px;
  cursor: pointer;
}

.form {
  padding: 0 40px;
}

.group {
  margin-bottom: 25px;
}

input, select {
  width: 100%;
  height: 34px;
  box-sizing: border-box;
}

.required {
  color: red;
  font-size: 12px;
  text-align: center;
}

.error {
  color: red;
  font-size: 12px;
  margin-top: 4px;
  display: none;
}

.buttons {
  text-align: center;
  margin: 30px 0;
}

.buttons button {
  width: 100px;
  height: 40px;
  margin: 0 10px;
}

/* ダイアログ */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.3);
  display: none;
  justify-content: center;
  align-items: center;
}

.dialog {
  background: #dfe5ea;
  padding: 20px;
  width: 260px;
  text-align: center;
  border: 1px solid #333;
}
.dialog button {
  width: 80px;
  height: 36px;
}
</style>
</head>

<body>

<div class="screen">

  <div class="header">
    商品追加
  </div>

  <div class="form">

    <!-- 商品名 -->
    <div class="group">
      商品名：
      <input id="name">
      <div class="required">※必須</div>
      <div class="error" id="errName">商品名を入力してください</div>
    </div>

    <!-- カテゴリー -->
    <div class="group">
      カテゴリー：
      <select id="categorySelect" onchange="toggleOther()">
        <option value="">選択してください</option>
        <option>おすすめ</option>
        <option>飲み放題</option>
        <option>スピードメニュー</option>
        <option>焼鳥（たれ）</option>
        <option>焼鳥（塩）</option>
        <option>一品</option>
        <option>デザート</option>
        <option>シメ</option>
        <option>ソフトドリンク</option>
        <option>アルコール</option>
        <option value="other">その他（サービス品）</option>
      </select>

      <!-- その他用入力 -->
      <input id="categoryOther" placeholder="カテゴリーを入力"
             style="margin-top:6px;" disabled>

      <div class="required">※必須</div>
      <div class="error" id="errCategory">カテゴリーを選択してください</div>
    </div>

    <!-- 値段 -->
    <div class="group">
      値段：
      <input id="price">
      <div class="required">※必須</div>
      <div class="error" id="errPrice">値段を入力してください</div>
    </div>

    <!-- 写真 -->
    <div class="group">
      写真：
      <input type="file">
      <div class="required">※任意</div>
    </div>

  </div>

  <div class="buttons">
    <button onclick="history.back()">戻る</button>
    <button onclick="openConfirm()">追加</button>
  </div>
</div>

<!-- 確認ダイアログ -->
<div class="overlay" id="confirm">
  <div class="dialog">
    商品の追加を許可しますか？
    <br><br>
    <button onclick="closeConfirm()">いいえ</button>
    <button onclick="add()">はい</button>
  </div>
</div>

<script>
function toggleOther(){
  const select = document.getElementById("categorySelect");
  const other = document.getElementById("categoryOther");

  if(select.value === "other"){
    other.disabled = false;
  } else {
    other.disabled = true;
    other.value = "";
  }
}

function openConfirm(){
  const name = document.getElementById("name").value.trim();
  const price = document.getElementById("price").value.trim();
  const select = document.getElementById("categorySelect").value;
  const other = document.getElementById("categoryOther").value.trim();

  document.getElementById("errName").style.display = "none";
  document.getElementById("errCategory").style.display = "none";
  document.getElementById("errPrice").style.display = "none";

  let hasError = false;

  if(name === ""){
    document.getElementById("errName").style.display = "block";
    hasError = true;
  }

  if(select === "" || (select === "other" && other === "")){
    document.getElementById("errCategory").style.display = "block";
    hasError = true;
  }

  if(price === ""){
    document.getElementById("errPrice").style.display = "block";
    hasError = true;
  }

  if(hasError) return;

  document.getElementById("confirm").style.display = "flex";
}

function closeConfirm(){
  document.getElementById("confirm").style.display = "none";
}

function add(){
  alert("商品を追加しました（仮）");
  location.href = "menu.html";
}

// ログアウト
function openLogout(){
  document.getElementById("logout").style.display = "flex";
}
function closeLogout(){
  document.getElementById("logout").style.display = "none";
}
</script>

</body>
</html>
