<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>テーブル管理</title>

<style>
body {
  margin: 0;
  display: flex;
  justify-content: center;
  font-family: sans-serif;
  background: #fff;
}

.screen {
  width: 360px;
  min-height: 100vh;
  padding: 20px;
  box-sizing: border-box;
  position: relative;
}

/* タイトル */
.title {
  color: #1e4be8;
  font-size: 18px;
  margin-bottom: 60px;
}

/* 行全体 */
.row {
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 50px;
  font-size: 16px;
}

/* ラベル */
.label {
  margin-right: 15px;
}

/* 番号枠 */
.box {
  border: 1px solid #000;
  padding: 12px 30px;
  font-size: 16px;
}

/* ボタンエリア */
.buttons {
  display: flex;
  justify-content: space-between;
  margin-top: 80px;
  padding: 0 10px;
}

.buttons button {
  width: 130px;
  height: 50px;
  font-size: 16px;
  background: #eee;
  border: 1px solid #999;
}

/* リンク装飾解除 */
a {
  text-decoration: none;
  color: inherit;
}
</style>
</head>

<body>

<div class="screen">

  <!-- タイトル -->
  <div class="title">テーブル管理</div>

  <!-- 変更前 -->
  <div class="row">
    <div class="label">変更前：</div>
    <div class="box">6番卓</div>
  </div>

  <!-- 変更後 -->
  <div class="row">
    <div class="label">変更後：</div>
    <div class="box">3番卓</div>
  </div>

  <!-- ボタン -->
  <div class="buttons">
    <a href="index.html">
      <button>戻る</button>
    </a>

   <a href="../menu.html">
      <button>決定</button>
    </a>
  </div>

</div>

</body>
</html>
