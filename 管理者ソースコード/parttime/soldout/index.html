<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>売り切れ設定</title>

<style>
body {
  margin: 0;
  display: flex;
  justify-content: center;
  font-family: sans-serif;
  background: #fff;
}

.screen {
  width: 360px;
  min-height: 100vh;
  padding: 20px;
  box-sizing: border-box;
  position: relative;
}

/* タイトル */
.title {
  color: #1e4be8;
  font-size: 18px;
  margin-bottom: 30px;
}

/* 検索欄 */
.search {
  display: flex;
  align-items: center;
  border: 1px solid #999;
  border-radius: 8px;
  padding: 8px 12px;
  margin-bottom: 30px;
}

.search input {
  width: 100%;
  border: none;
  outline: none;
  font-size: 14px;
}

.search .icon {
  font-size: 18px;
  margin-left: 8px;
}

/* 検索結果 */
.result-title {
  font-size: 16px;
  margin-bottom: 10px;
}

.result-box {
  height: 280px;
  border: 1px solid #999;
  margin-bottom: 40px;
}

/* 下ボタン */
.buttons {
  display: flex;
  justify-content: space-between;
  padding: 0 10px;
}

.buttons button {
  width: 130px;
  height: 50px;
  font-size: 16px;
  background: #eee;
  border: 1px solid #999;
}

/* リンク装飾解除 */
a {
  text-decoration: none;
  color: inherit;
}

/* ページ番号 */
.page {
  position: absolute;
  right: 10px;
  bottom: 10px;
  font-size: 14px;
  color: #777;
}
</style>
</head>

<body>

<div class="screen">

  <div class="title">売り切れ表示</div>

  <!-- 検索 -->
  <div class="search">
    <input type="text" value="焼き鳥">
    <span class="icon">🔍</span>
  </div>

  <!-- 検索結果 -->
  <div class="result-title">検索結果</div>
  <div class="result-box"></div>

  <!-- ボタン -->
  <div class="buttons">
    <a href="../menu.html">
      <button>戻る</button>
    </a>

    <a href="content.html">
      <button>次へ</button>
    </a>
  </div>

 


</body>
</html>
