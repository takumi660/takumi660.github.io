<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>提供済み変更 - 注文履歴</title>

<style>
body {
  margin: 0;
  display: flex;
  justify-content: center;
  font-family: sans-serif;
  background: #fff;
}

.screen {
  width: 360px;
  box-sizing: border-box;
}

/* 上部ヘッダー */
.top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 15px;
  border-bottom: 1px solid #999;
  font-size: 14px;
}

.top-left {
  color: #1e4be8;
}

/* タイトル */
.title {
  text-align: center;
  font-size: 18px;
  margin: 15px 0;
  font-weight: bold;
}

/* リスト全体 */
.list {
  padding: 0 15px;
}

/* 見出し行 */
.header-row {
  display: grid;
  grid-template-columns: 30px 1fr 60px 60px;
  font-size: 14px;
  margin-bottom: 10px;
}

/* 商品行 */
.row {
  display: grid;
  grid-template-columns: 30px 1fr 60px 60px;
  align-items: center;
  margin: 12px 0;
  font-size: 15px;
}

/* チェックボックス（ダミー） */
.box {
  width: 20px;
  height: 20px;
  border: 1px solid #000;
  text-align: center;
  line-height: 20px;
}

.checked::after {
  content: "✓";
  font-size: 16px;
}

/* 済マーク */
.done {
  background: #f6a99f;
  font-size: 12px;
  padding: 2px 6px;
  border-radius: 50%;
  margin-right: 6px;
}

/* 商品名 */
.name {
  display: flex;
  align-items: center;
}

/* 数 */
.center {
  text-align: center;
}

/* ボタン */
.buttons {
  display: flex;
  justify-content: space-between;
  padding: 30px 15px 20px;
}

.buttons button {
  width: 130px;
  height: 55px;
  font-size: 16px;
  background: #eee;
  border: 1px solid #999;
}
</style>
</head>

<body>

<div class="screen">

  <!-- 上部 -->
  <div class="top">
    <div class="top-left">提供済み変更</div>
    <div>卓番：○○</div>
  </div>

  <div class="title">注文履歴</div>

  <!-- 一覧 -->
  <div class="list">

    <div class="header-row">
      <div></div>
      <div>商品名</div>
      <div class="center">注文数</div>
      <div class="center">配膳数</div>
    </div>

    <div class="row">
      <div class="box"></div>
      <div class="name"><span class="done">済</span>フライドポテト</div>
      <div class="center">1</div>
      <div class="center">1</div>
    </div>

    <div class="row">
      <div class="box checked"></div>
      <div class="name">ポテトサラダ</div>
      <div class="center">2</div>
      <div class="center">0</div>
    </div>

    <div class="row">
      <div class="box"></div>
      <div class="name">キャベツの塩だれ</div>
      <div class="center">1</div>
      <div class="center">0</div>
    </div>

    <div class="row">
      <div class="box checked"></div>
      <div class="name">きゅうりの一本漬け</div>
      <div class="center">1</div>
      <div class="center">0</div>
    </div>

    <div class="row">
      <div class="box"></div>
      <div class="name">だし巻き</div>
      <div class="center">1</div>
      <div class="center">0</div>
    </div>

    <div class="row">
      <div class="box"></div>
      <div class="name"><span class="done">済</span>鶏の唐揚げ</div>
      <div class="center">1</div>
      <div class="center">1</div>
    </div>

    <div class="row">
      <div class="box"></div>
      <div class="name">タコのから揚げ</div>
      <div class="center">1</div>
      <div class="center">0</div>
    </div>

  </div>

  <!-- 下ボタン -->
  <div class="buttons">
    
    <a href="index.html">
      <button type="button">戻る</button>
    </a>

    <!-- 次へ：次工程 -->
    <a href="content.html">
      <button type="button">次へ</button>
    </a>
  </div>

</div>

</body>
</html>
``
