<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>提供済み変更</title>

<style>
body {
  margin: 0;
  display: flex;
  justify-content: center;
  font-family: sans-serif;
  background: #fff;
}

.screen {
  width: 360px;
  padding: 20px;
  box-sizing: border-box;
}

/* タイトル */
.header {
  text-align: center;
  color: #1e4be8;
  font-size: 18px;
  margin-bottom: 40px;
}

/* ラベル */
.label {
  font-size: 16px;
  margin-bottom: 10px;
}

/* 入力欄 */
input {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  box-sizing: border-box;
  border: 1px solid #999;
}

.required {
  color: red;
  font-size: 12px;
  margin-top: 5px;
  margin-bottom: 40px;
}

/* ボタン */
.buttons {
  display: flex;
  justify-content: space-between;
  margin-top: 30px;
}

.buttons button {
  width: 130px;
  height: 55px;
  font-size: 16px;
  background: #eee;
  border: 1px solid #999;
}

/* リンク装飾解除 */
a {
  text-decoration: none;
  color: inherit;
}
</style>
</head>

<body>

<div class="screen">

  <div class="header">提供済み変更</div>

  <!-- テーブル番号 -->
  <div class="label">テーブル番号：</div>
  <input type="text" id="tableNo" placeholder="※必須">
  <div class="required">※必須</div>

  <!-- ボタン -->
  <div class="buttons">
    <!-- 戻る -->
    <a href="../menu.html">
      <button>戻る</button>
    </a>

    <!-- 決定（入力チェックあり） -->
    <button type="button" onclick="goNext()">決定</button>
  </div>

</div>

<script>
function goNext() {
  const tableNo = document.getElementById("tableNo").value.trim();

  if (tableNo === "") {
    alert("テーブル番号を入力してください");
    return;
  }

  // 入力されていれば次の画面へ
  location.href = "list.html";
}
</script>

</body>
</html>
