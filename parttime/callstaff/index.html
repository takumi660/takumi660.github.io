<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>店員呼び出し</title>

<style>
body {
  margin: 0;
  display: flex;
  justify-content: center;
  font-family: sans-serif;
  background: #fff;
}

.screen {
  width: 360px;
  min-height: 100vh;
  padding: 15px;
  box-sizing: border-box;
  position: relative;
}

/* ヘッダー */
.header {
  text-align: center;
  font-size: 14px;
}
.header-sub {
  margin-top: 3px;
}



/* 枠 */
.box {
  border: 1px solid #000;
  margin-top: 25px;
  padding: 20px 15px;
  min-height: 420px;
  box-sizing: border-box;
}

/* 見出し */
.box-title {
  text-align: center;
  font-size: 18px;
  margin-bottom: 30px;
}

/* 卓ボタン */
.call {
  width: 100%;
  max-width: 260px;
  margin: 20px auto;
  padding: 15px 0;
  text-align: center;
  background: #bcd0ee;
  border: 1px solid #333;
  font-size: 18px;
  cursor: pointer;
}

/* ✅ チェックボックスは見せない */
.call-check {
  display: none;
}

/* ✅ 押されたら消える */
.call-check:checked + label {
  display: none;
}

/* 戻る */
.footer {
  margin-top: 25px;
  padding-left: 10px;
}

.footer button {
  width: 140px;
  height: 45px;
  font-size: 16px;
  background: #eee;
  border: 1px solid #999;
}

/* リンク装飾解除 */
a {
  text-decoration: none;
  color: inherit;
}
</style>
</head>

<body>

<div class="screen">

  

  <div class="header">
    みどり亭　メニュー管理システム
    <div class="header-sub">従業員用</div>
  </div>

  <div class="box">
    <div class="box-title">※店員呼び出し※</div>

    <!-- 卓1 -->
    <input type="checkbox" id="call1" class="call-check">
    <label for="call1" class="call">○○卓</label>

    <!-- 卓2 -->
    <input type="checkbox" id="call2" class="call-check">
    <label for="call2" class="call">○○卓</label>

    <!-- 卓3 -->
    <input type="checkbox" id="call3" class="call-check">
    <label for="call3" class="call">○○卓</label>

  </div>

  <div class="footer">
    <a href="../menu.html">
      <button>戻る</button>
    </a>
  </div>

</div>

</body>
</html>
