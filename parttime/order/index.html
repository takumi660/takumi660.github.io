<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注文</title>

<style>
body {
  margin: 0;
  display: flex;
  justify-content: center;
  font-family: sans-serif;
  background: #fff;
}

.screen {
  width: 360px;
  min-height: 100vh;
  padding: 20px;
  box-sizing: border-box;
  position: relative;
}

.header {
  color: #1e4be8;
  font-size: 16px;
  margin-bottom: 60px;
}

.center {
  text-align: center;
  font-size: 16px;
  margin-bottom: 30px;
}

.input-box {
  width: 260px;
  height: 45px;
  border: 1px solid #000;
  margin: 0 auto 60px;
  display: block;
  font-size: 16px;
  text-align: center;
}

.buttons {
  display: flex;
  justify-content: space-between;
  padding: 0 20px;
}

.buttons button {
  width: 120px;
  height: 45px;
  font-size: 16px;
  background: #eee;
  border: 1px solid #999;
}

.page {
  position: absolute;
  right: 10px;
  bottom: 10px;
  font-size: 14px;
  color: #777;
}
</style>
</head>

<body>

<div class="screen">

  <div class="header">注文</div>

  <div class="center">
    設定するテーブル番号を<br>
    入力してください
  </div>

  <input type="text" id="tableNo" class="input-box">

  <div class="buttons">
    <a href="../menu.html">
      <button type="button">戻る</button>
    </a>

    <!-- ✅ JSで保存してから遷移 -->
    <button type="button" onclick="next()">決定</button>
  </div>

  <div class="page">8-1</div>

</div>

<script>
function next() {
  const tableNo = document.getElementById("tableNo").value.trim();

  if (tableNo === "") {
    alert("テーブル番号を入力してください");
    return;
  }

  // ✅ 入力値を保存
  localStorage.setItem("tableNo", tableNo);

  // ✅ 次の画面へ
  location.href = "freedrink.html";
}
</script>

</body>
</html>
