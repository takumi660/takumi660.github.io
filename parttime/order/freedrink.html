<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飲み放題登録</title>
 
<style>
body {
  margin: 0;
  display: flex;
  justify-content: center;
  font-family: sans-serif;
  background: #fff;
}
 
.screen {
  width: 360px;
  padding: 20px;
  box-sizing: border-box;
}
 
/* タイトル */
.header {
  text-align: center;
  color: #1e4be8;
  font-size: 18px;
  margin-bottom: 35px;
}
 
/* ラベル */
.label {
  margin-bottom: 8px;
  font-size: 16px;
}
 
/* 入力欄 */
input, select {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  border: 1px solid #999;
  box-sizing: border-box;
}
 
/* 必須表示 */
.required {
  color: red;
  font-size: 12px;
  margin-top: 5px;
  margin-bottom: 30px;
}
 
/* ボタンエリア */
.buttons {
  display: flex;
  justify-content: space-between;
  margin-top: 40px;
}
 
.buttons button {
  width: 130px;
  height: 55px;
  font-size: 16px;
  background: #eee;
  border: 1px solid #999;
}
 
a {
  text-decoration: none;
  color: inherit;
}
</style>
</head>
 
<body>
 
<div class="screen">
 
  <div class="header">注文</div>
 
  <!-- テーブル番号（自動表示） -->
  <div class="label">テーブル番号：</div>
  <input type="text" id="tableNo" readonly>
  <div class="required">※必須</div>
 
  <!-- 飲み放題 -->
  <div class="label">飲み放題：</div>
  <select id="drink">
    <option value="">選択してください</option>
    <option value="none">なし</option>
    <option value="standard">スタンダード</option>
    <option value="premium">プレミアム</option>
  </select>
  <div class="required">※必須</div>
 
  <!-- ボタン -->
  <div class="buttons">
    <a href="../menu.html">
      <button type="button">戻る</button>
    </a>
 
    <a href="../menu.html">
      <button type="button">確定</button>
    </a>
  </div>
 
</div>

<script>
/* ✅ ページ表示時にテーブル番号をセット */
const tableNo = localStorage.getItem("tableNo");
if (tableNo) {
  document.getElementById("tableNo").value = tableNo;
}

/* ✅ 確定ボタン */
function confirmOrder() {
  const drink = document.getElementById("drink").value;

  if (drink === "") {
    alert("飲み放題を選択してください");
    return;
  }

  // 次の画面へ（例）
  location.href = "next.html";
}
</script>
 
</body>
</html>
