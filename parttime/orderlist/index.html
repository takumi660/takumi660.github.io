<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>オーダー一覧</title>

<style>
body {
  margin: 0;
  display: flex;
  justify-content: center;
  font-family: sans-serif;
  background: #fff;
}

.screen {
  width: 360px;
  min-height: 100vh;
  padding: 20px;
  box-sizing: border-box;
  position: relative;
}

/* タイトル */
.header {
  text-align: center;
  font-size: 18px;
  margin-bottom: 20px;
}

/* グリッド */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

/* 卓枠（黒枠） */
.box {
  border: 1px solid #000;
  height: 150px;
  padding: 8px;
  box-sizing: border-box;
  font-size: 14px;
}

/* 卓番 */
.table {
  border-bottom: 1px solid #000;
  padding-bottom: 4px;
  margin-bottom: 6px;
  font-weight: bold;
}

/* 注文例 */
.order {
  font-size: 13px;
  margin: 3px 0;
}

/* 戻るボタン */
.footer {
  display: flex;
  justify-content: center;
  margin-top: 25px;
}

.footer button {
  width: 140px;
  height: 45px;
  font-size: 16px;
  background: #eee;
  border: 1px solid #999;
}

/* ページ番号 */
.page {
  position: absolute;
  right: 10px;
  bottom: 10px;
  font-size: 14px;
  color: #777;
}
</style>
</head>

<body>

<div class="screen">

  <div class="header">オーダー一覧</div>

  <div class="grid">
    <!-- 卓番6（例あり） -->
    <div class="box">
      <div class="table">卓番：6</div>
      <div class="order">フライドポテト ×1</div>
      <div class="order">ポテトサラダ ×2</div>
      <div class="order">鶏の唐揚げ ×1</div>
    </div>

    <!-- 卓番1 -->
    <div class="box">
      <div class="table">卓番：1</div>
    </div>

    <!-- 空き枠 -->
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
  </div>

  <!-- 戻る -->
  <div class="footer">
    <a href="../menu.html">
      <button>戻る</button>
    </a>
  </div>

  <div class="page">11</div>

</div>

</body>
</html>
