<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アルバイト用</title>

<style>
body {
  margin: 0;
  display: flex;
  justify-content: center;
  font-family: sans-serif;
  background: #fff;
}

.screen {
  width: 360px;
}

.header {
  position: relative;
  padding: 20px 10px;
  text-align: center;
}

.gear {
  position: absolute;
  top: 15px;
  right: 15px;
  font-size: 22px;
  cursor: pointer;
}

.menu {
  padding: 10px 40px;
  text-align: center;
}

button {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  font-size: 15px;
}

/* ログアウト共通 */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  display: none;
  justify-content: center;
  align-items: center;
}

.dialog {
  background: #e4e9ee;
  padding: 20px;
  width: 260px;
  text-align: center;
  border: 1px solid #333;
}
</style>
</head>

<body>

<div class="screen">
  <div class="header">
    <div class="gear" onclick="openLogout()">⚙</div>
    みどり亭　メニュー管理システム<br>
    アルバイト用
  </div>

  <div class="menu">
    
    <a href="table/index.html">
    <button>テーブル管理</button>
    </a>

    <a href="soldout/index.html">
    <button>売り切れ設定</button>
    </a>

     <a href="order/index.html">
    <button>飲み放題登録</button>
    </a>
    
    <a href="cancel/index.html">
    <button>注文キャンセル</button>
    </a>
    <a href="provided/index.html">
      <button>提供済み変更</button>
    </a>
    
    <a href="orderlist/index.html">
      <button>オーダー一覧</button>
    </a>
    <a href="callstaff/index.html">
      <button>店員呼び出し</button>
    </a>
  </div>
</div>

<div class="overlay" id="logout">
  <div class="dialog">
    ログアウトしますか？<br><br>
    <button onclick="closeLogout()">いいえ</button>
    <button onclick="logout()">はい</button>
  </div>
</div>

<script>
function openLogout() {
  document.getElementById("logout").style.display = "flex";
}
function closeLogout() {
  document.getElementById("logout").style.display = "none";
}
function logout() {
  location.href = "../index.html";
}
</script>

</body>
</html>
